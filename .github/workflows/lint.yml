name: Lint

on:
  push:
    branches: [main,]
  pull_request:
    branches: [main,]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: strivo-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "9"
          cache: "pnpm"
          cache-dependency-path: strivo-server/pnpm-lock.yaml

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
